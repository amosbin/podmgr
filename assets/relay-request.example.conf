# Relay request example (C reconciler format)
# tenant <name> enabled=<bool> mode=<discoverable|discoverer> groups=<csv>
tenant traefik enabled=true mode=discoverer groups=abc
tenant app1 enabled=true mode=discoverable groups=abc

# route source=<tenant> target=<tenant> host=<fqdn> path_prefix=<path> backend=<url>
route source=traefik target=app1 host=app1.localhost path_prefix=/ backend=http://app1:3000
